[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

# Fhenix network configuration
[rpc_endpoints]
fhenix_testnet = "https://api.helium.fhenix.zone"

[etherscan]
fhenix_testnet = { key = "${API_KEY}", url = "https://explorer.helium.fhenix.zone/api" }

# Dependencies
[dependencies]
fhenix-solidity = "git+https://github.com/fhenixprotocol/fhenix-solidity"
