[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.25"
optimizer = true
optimizer_runs = 200

remappings = [
    "@fhenixprotocol/contracts/=lib/cofhe-contracts/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "fhenix-solidity/src/types/euint.sol=lib/cofhe-contracts/contracts/FHE.sol",
    "fhenix-solidity/src/types/ebool.sol=lib/cofhe-contracts/contracts/FHE.sol",
    "fhenix-solidity/src/types/eaddress.sol=lib/cofhe-contracts/contracts/FHE.sol",
    "fhenix-solidity/src/lib/HE.sol=lib/cofhe-contracts/contracts/FHE.sol"
]

# Fhenix network configuration
[rpc_endpoints]
fhenix_testnet = "https://api.helium.fhenix.zone"

[etherscan]
fhenix_testnet = { key = "${API_KEY}", url = "https://explorer.helium.fhenix.zone/api" }

# Dependencies
[dependencies]
fhenix-solidity = "git+https://github.com/fhenixprotocol/fhenix-solidity"
